<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Amigos Showtime Stream Overlay</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="overlay-container">
        <!-- Game Window (Leave empty for OBS layout alignment) -->
        <div class="module game-feed">
            <span class="rerun-label" id="rerun-label" style="display: none;">Rerun</span>
        </div>

        <!-- Camera/Chat Window -->
        <div class="module sidebar-camera" id="sidebar-camera">
            <span class="cam-label" id="camera-label">Live Camera</span>
        </div>
        <div class="module sidebar-chat" id="sidebar-chat">
            <span class="chat-label" id="chat-label">Stream Chat</span>
            <div class="chat-messages-holder" id="chat-messages-holder"></div>
            <div class="chat-disabled-message" id="chat-disabled-message"><!-- Enter text here if you want to --></div>
        </div>

        <!-- Bottom Informational Bar Group -->

        <div class="bottom-bar">
    <div class="module info-block">
        <div class="game-title" id="display-game-title">Waiting for Controller...</div>
        <div class="game-meta">Category: <span id="display-category">-</span> | Player: <span id="display-runner">-</span></div>
        <div class="game-comments">Commentators || Collaborators: <span id="display-commentators">-</span></div>
       
    </div>
    
    <div class="module timer-block">
        <div class="timer-label" id="timer-label">Current Game Time</div>
        <div class="timer-digits">
            <span id="time-main">00:00:00</span>
        </div>
        <div class="timer-estimate">EST: <span id="display-estimate">0:00:00</span></div>
        <div class="timer-estimate" id="personal-best-row">PB: <span id="display-personal-best">--:--:--</span></div>
        <div class="timer-local-time">Local Time: <span id="display-local-time">--:-- --</span></div>
    </div>
    
    <div class="module logo-block">
        <img src="logo.png" alt="Stream Logo" class="stream-logo">
    </div>
</div>
